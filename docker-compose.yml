version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heavy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-heavy_metal}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  gateway:
    build: .
    depends_on: [postgres, redis]
    environment:
      HM_GATEWAY_BIND: 0.0.0.0:8080
      HM_ZERO_STAKED: "false"
    ports: ["8080:8080"]
  ui:
    build: ./ui
    depends_on: [gateway]
    ports: ["3000:80"]
volumes:
  pgdata:
