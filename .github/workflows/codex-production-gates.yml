name: Codex production gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-production-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static iPhone control-plane
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile validation scripts
        run: python3 -m py_compile scripts/validate_mobile_iphone_platform.py

      - name: Validate mobile iPhone datasets and settings
        run: python3 scripts/validate_mobile_iphone_platform.py

      - name: Validate static file contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          required = [
              'index.html',
              'styles.css',
              'app.js',
              'manifest.webmanifest',
              'service-worker.js',
              'README.md',
              'docs/iphone-local-dev-setup.md',
              'AGENTS.md',
              'scripts/codex_cloud_setup.sh',
          ]
          missing = [path for path in required if not Path(path).is_file()]
          if missing:
              raise SystemExit(f'missing required files: {missing}')
          print('static file contract is valid')
          PY

      - name: Run Codex cloud setup smoke check
        run: sh scripts/codex_cloud_setup.sh
