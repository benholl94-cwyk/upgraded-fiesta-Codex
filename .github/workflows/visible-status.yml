name: visible-status

on:
  push:
    paths-ignore:
      - logs/visible-status.json
      - logs/monitoring-report.json
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run monitor
        run: python3 scripts/monitor_platform.py
      - name: Write visible status
        if: always()
        run: python3 scripts/write_visible_status.py
      - name: Commit visible status
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/monitoring-report.json logs/visible-status.json
          if git diff --cached --quiet; then
            echo "visible status unchanged"
          else
            git commit -m "Update visible platform status [skip ci]"
            git push
          fi
      - name: Upload visible status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visible-platform-status
          path: |
            logs/monitoring-report.json
            logs/visible-status.json
          if-no-files-found: error
          retention-days: 14
