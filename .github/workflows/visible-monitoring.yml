name: visible-monitoring

on:
  push:
    paths-ignore:
      - logs/visible-monitoring-report.json
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

jobs:
  visible-monitoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository monitor
        id: monitor
        continue-on-error: true
        run: |
          set +e
          mkdir -p logs
          python3 scripts/monitor_platform.py > logs/monitoring-stdout.txt 2>&1
          code=$?
          echo "MONITOR_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Run setup verification
        id: setup
        continue-on-error: true
        run: |
          set +e
          bash .codex/setup.sh >> logs/monitoring-stdout.txt 2>&1
          code=$?
          echo "SETUP_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Write visible report
        if: always()
        run: python3 scripts/write_visibility_report.py

      - name: Commit visible report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/visible-monitoring-report.json logs/monitoring-report.json logs/monitoring-stdout.txt
          git diff --cached --quiet && exit 0
          git commit -m "Update visible monitoring report"
          git push

      - name: Fail after report commit if checks failed
        if: always()
        run: |
          if [ "${MONITOR_EXIT_CODE:-999}" != "0" ] || [ "${SETUP_EXIT_CODE:-999}" != "0" ]; then
            exit 1
          fi
