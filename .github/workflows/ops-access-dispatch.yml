name: Ops Access Dispatch

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Operations profile
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
          - mobile-lab
      operation:
        description: Named operation to validate for dispatch
        required: true
        default: ops.validate
        type: choice
        options:
          - ops.validate
          - repo.validate
          - service.status
          - external.api.check
      accept_phrase:
        description: Enter USER_ACCEPT_OPS_ACCESS_THRESHOLDS to validate threshold acceptance
        required: true
        default: ""
        type: string
      accept_t01_host_identity_pin:
        description: T01 approved remote host identity pin exists outside Git
        required: true
        default: false
        type: boolean
      accept_t02_dedicated_low_privilege_account:
        description: T02 dedicated low-privilege operations account exists
        required: true
        default: false
        type: boolean
      accept_t03_environment_scoped_access_credential:
        description: T03 environment-scoped access credential exists outside Git
        required: true
        default: false
        type: boolean
      accept_t04_remote_guard_reviewed:
        description: T04 reviewed remote guard implementation exists
        required: true
        default: false
        type: boolean
      accept_t05_staging_denial_audited:
        description: T05 staging validation shows unknown operations denied and audited
        required: true
        default: false
        type: boolean
      accept_t06_redaction_proof_synthetic_only:
        description: T06 redaction proof uses synthetic credential markers only
        required: true
        default: false
        type: boolean
      accept_t07_remote_activation_disabled_by_default:
        description: T07 remote activation remains disabled by default
        required: true
        default: false
        type: boolean
      activate_remote:
        description: Remote execution activation gate. Must remain false until reviewed guard and environment secrets exist.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-ops-access:
    name: Validate ops access gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPS_MANIFEST: config/ops-command-manifest.example.json
      OPS_THRESHOLDS: config/ops-activation-thresholds.example.json
      OPS_SELECTED_PROFILE: ${{ inputs.profile }}
      OPS_SELECTED_OPERATION: ${{ inputs.operation }}
      OPS_ACCEPT_PHRASE: ${{ inputs.accept_phrase }}
      OPS_ACCEPT_T01: ${{ inputs.accept_t01_host_identity_pin }}
      OPS_ACCEPT_T02: ${{ inputs.accept_t02_dedicated_low_privilege_account }}
      OPS_ACCEPT_T03: ${{ inputs.accept_t03_environment_scoped_access_credential }}
      OPS_ACCEPT_T04: ${{ inputs.accept_t04_remote_guard_reviewed }}
      OPS_ACCEPT_T05: ${{ inputs.accept_t05_staging_denial_audited }}
      OPS_ACCEPT_T06: ${{ inputs.accept_t06_redaction_proof_synthetic_only }}
      OPS_ACCEPT_T07: ${{ inputs.accept_t07_remote_activation_disabled_by_default }}
      OPS_ACTIVATE_REMOTE: ${{ inputs.activate_remote }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: python3 scripts/validate_repo.py

      - name: Validate operations manifest
        run: python3 scripts/validate_ops_access_config.py --manifest "$OPS_MANIFEST"

      - name: Build runtime user acceptance file
        run: |
          set -euo pipefail
          mkdir -p .ops-runtime
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def as_bool(name: str) -> bool:
            return os.environ[name].lower() == "true"

          acceptance = {
            "schema": "ops-access.user-acceptance.v1",
            "accept_phrase": os.environ["OPS_ACCEPT_PHRASE"],
            "user_accept": True,
            "remote_activation_requested": as_bool("OPS_ACTIVATE_REMOTE"),
            "accepted_thresholds": {
              "T01_HOST_IDENTITY_PIN": as_bool("OPS_ACCEPT_T01"),
              "T02_DEDICATED_LOW_PRIVILEGE_ACCOUNT": as_bool("OPS_ACCEPT_T02"),
              "T03_ENVIRONMENT_SCOPED_ACCESS_CREDENTIAL": as_bool("OPS_ACCEPT_T03"),
              "T04_REMOTE_GUARD_REVIEWED": as_bool("OPS_ACCEPT_T04"),
              "T05_STAGING_DENIAL_AUDITED": as_bool("OPS_ACCEPT_T05"),
              "T06_REDACTION_PROOF_SYNTHETIC_ONLY": as_bool("OPS_ACCEPT_T06"),
              "T07_REMOTE_ACTIVATION_STILL_DISABLED_BY_DEFAULT": as_bool("OPS_ACCEPT_T07")
            },
            "evidence": {
              "source": "github_actions_workflow_dispatch_inputs",
              "sanitized": True,
              "sensitive_material_present": False
            }
          }
          Path(".ops-runtime/user-acceptance.json").write_text(json.dumps(acceptance, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps({
            "ok": True,
            "acceptance_file": ".ops-runtime/user-acceptance.json",
            "secret_material_written": False
          }, indent=2, sort_keys=True))
          PY

      - name: Validate explicit user acceptance gates
        run: python3 scripts/validate_ops_user_accept.py --thresholds "$OPS_THRESHOLDS" --acceptance .ops-runtime/user-acceptance.json

      - name: Enforce fail-closed remote activation gate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          manifest_path = Path(os.environ["OPS_MANIFEST"])
          profile = os.environ["OPS_SELECTED_PROFILE"]
          operation = os.environ["OPS_SELECTED_OPERATION"]
          activate_remote = os.environ["OPS_ACTIVATE_REMOTE"].lower() == "true"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          errors = []
          profiles = manifest.get("profiles", {})
          operations = manifest.get("operations", {})

          if profile not in profiles:
            errors.append(f"unknown profile: {profile}")
          if operation not in operations:
            errors.append(f"unknown operation: {operation}")

          selected_profile = profiles.get(profile, {})
          selected_operation = operations.get(operation, {})

          if selected_profile.get("remote_execution_enabled") is not False:
            errors.append("manifest must default remote_execution_enabled to false")

          if activate_remote:
            errors.append("remote activation is intentionally disabled in this workflow until reviewed remote guard and environment-scoped credentials exist")

          if selected_operation.get("disabled_until_remote_guard_installed") is True:
            errors.append(f"operation is reserved and disabled until remote guard installation: {operation}")

          result = {
            "ok": not errors,
            "profile": profile,
            "operation": operation,
            "remote_activation_requested": activate_remote,
            "remote_execution_performed": False,
            "errors": errors,
          }
          print(json.dumps(result, indent=2, sort_keys=True))
          sys.exit(0 if not errors else 1)
          PY

      - name: Emit sanitized dispatch summary
        if: always()
        run: |
          {
            echo "## Ops Access Dispatch"
            echo ""
            echo "- Profile: $OPS_SELECTED_PROFILE"
            echo "- Operation: $OPS_SELECTED_OPERATION"
            echo "- User acceptance validator: required"
            echo "- Remote execution performed: false"
            echo "- Activation mode: fail-closed"
            echo ""
            echo "Remote execution remains disabled until the reviewed remote guard, host identity pin, dedicated account, and environment-scoped credentials are present."
          } >> "$GITHUB_STEP_SUMMARY"
