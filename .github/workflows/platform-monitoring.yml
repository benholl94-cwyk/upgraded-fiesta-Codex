name: platform-monitoring

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run platform monitor
        run: python3 scripts/monitor_platform.py
      - name: Upload monitoring report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-monitoring-report
          path: logs/monitoring-report.json
          if-no-files-found: error
          retention-days: 14
